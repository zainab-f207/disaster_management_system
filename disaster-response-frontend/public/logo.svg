<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021C0E" />
      <stop offset="40%" stop-color="#05381E" />
      <stop offset="70%" stop-color="#0A4D2B" />
      <stop offset="100%" stop-color="#01140A" />
    </linearGradient>

    <!-- Rich Gold Gradient for Trim and Borders -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="25%" stop-color="#FFD54F" />
      <stop offset="50%" stop-color="#FFB300" />
      <stop offset="75%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>

    <!-- Emerald Glow Gradient -->
    <radialGradient id="emeraldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#00E676" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00E676" stop-opacity="0" />
    </radialGradient>

    <!-- SOS/Alert Radial Glow -->
    <radialGradient id="sosGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FF9100" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0" />
    </radialGradient>

    <!-- Silver/Steel Accent Gradient -->
    <linearGradient id="silverAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#CFD8DC" />
      <stop offset="100%" stop-color="#78909C" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.75" />
    </filter>

    <!-- Glow Effect Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Glow Behind Logo -->
  <circle cx="250" cy="210" r="170" fill="url(#emeraldGlow)" opacity="0.6" />

  <!-- 1. SHIELD STRUCTURE (Reduced length and improved proportions) -->
  <!-- Outer Shield Shadow & Body -->
  <path d="M250 35 L400 85 C400 85 418 200 400 295 C380 360 310 415 250 435 C190 415 120 360 100 295 C82 200 100 85 100 85 Z" 
        fill="url(#shieldBg)" filter="url(#dropShadow)" />

  <!-- Outer Gold Border -->
  <path d="M250 37 L396 87 C396 87 414 198 396 291 C377 354 308 409 250 429 C192 409 123 354 104 291 C86 198 104 87 104 87 Z" 
        fill="none" stroke="url(#goldBorder)" stroke-width="6" stroke-linecap="round" />

  <!-- Inner Steel/Silver Border Accent -->
  <path d="M250 46 L385 93 C385 93 401 192 385 278 C368 335 304 388 250 408 C196 388 132 335 115 278 C99 192 115 93 115 93 Z" 
        fill="none" stroke="url(#silverAccent)" stroke-width="2" opacity="0.8" />

  <!-- 2. BACKGROUND MESH NETWORK (Connected Responders & Help Grid) -->
  <g opacity="0.25">
    <!-- Network Lines -->
    <line x1="250" y1="105" x2="170" y2="155" stroke="#00E676" stroke-width="2" />
    <line x1="250" y1="105" x2="330" y2="155" stroke="#00E676" stroke-width="2" />
    <line x1="170" y1="155" x2="140" y2="240" stroke="#00E676" stroke-width="1.5" />
    <line x1="330" y1="155" x2="360" y2="240" stroke="#00E676" stroke-width="1.5" />
    <line x1="140" y1="240" x2="190" y2="320" stroke="#00E676" stroke-width="1.5" />
    <line x1="360" y1="240" x2="310" y2="320" stroke="#00E676" stroke-width="1.5" />
    <line x1="190" y1="320" x2="250" y2="350" stroke="#00E676" stroke-width="2" />
    <line x1="310" y1="320" x2="250" y2="350" stroke="#00E676" stroke-width="2" />
    
    <!-- Cross connections -->
    <line x1="170" y1="155" x2="250" y2="220" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="330" y1="155" x2="250" y2="220" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="140" y1="240" x2="250" y2="220" stroke="#00E676" stroke-width="1.5" />
    <line x1="360" y1="240" x2="250" y2="220" stroke="#00E676" stroke-width="1.5" />

    <!-- Network Nodes -->
    <circle cx="250" cy="105" r="5" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="170" cy="155" r="4" fill="#00E676" />
    <circle cx="330" cy="155" r="4" fill="#00E676" />
    <circle cx="140" cy="240" r="5" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="360" cy="240" r="5" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="190" cy="320" r="4" fill="#00E676" />
    <circle cx="310" cy="320" r="4" fill="#00E676" />
    <circle cx="250" cy="350" r="5" fill="#00E676" filter="url(#neonGlow)" />
  </g>

  <!-- 3. EMERGENCY RADAR / SOS WAVES -->
  <circle cx="250" cy="215" r="85" fill="none" stroke="#FF5722" stroke-width="2" stroke-dasharray="8,8" opacity="0.4" filter="url(#neonGlow)" />
  <circle cx="250" cy="215" r="110" fill="none" stroke="#FF9100" stroke-width="1.5" stroke-dasharray="12,6" opacity="0.3" />

  <!-- 4. PAKISTAN THEME: CRESCENT & STAR -->
  <g transform="translate(217, 60)" filter="url(#neonGlow)">
    <path d="M22 6 A28 28 0 1 0 58 42 A23 23 0 1 1 22 6" fill="#FFFFFF" />
    <polygon points="46,12 49,20 57,20 51,25 53,33 46,28 39,33 41,25 35,20 43,20" fill="#FFD54F" />
  </g>

  <!-- 5. CENTRAL SYMBOL: HIGHLIGHTED LINED HEART & HOUSE WITH RELIEF CROSS -->
  <circle cx="250" cy="225" r="45" fill="url(#sosGlow)" />

  <!-- Highlighted Lined Heart Shape -->
  <path d="M250 268 C205 236 191 195 223 177 C241 166 250 182 250 182 C250 182 259 166 277 177 C309 195 295 236 250 268 Z" 
        fill="none" stroke="#FF3D00" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
  <path d="M250 268 C205 236 191 195 223 177 C241 166 250 182 250 182 C250 182 259 166 277 177 C309 195 295 236 250 268 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />

  <!-- Highlighted Lined House Silhouette -->
  <!-- House base outline -->
  <path d="M228 220 L228 244 L272 244 L272 220" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
  <!-- House Roof outline -->
  <path d="M220 220 L250 195 L280 220" fill="none" stroke="#FFD54F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />

  <!-- Glowing Relief Cross inside Lined House -->
  <path d="M250 212 L250 232 M240 222 L260 222" fill="none" stroke="#FF3D00" stroke-width="3.5" stroke-linecap="round" filter="url(#neonGlow)" />
  <path d="M250 212 L250 232 M240 222 L260 222" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" />

  <!-- 6. TEXT & BANNER (Adjusted layout, improved contrast, and visibility) -->
  <g filter="url(#dropShadow)">
    <!-- Lower Banner - Sleeker and higher contrast -->
    <path d="M130 350 L370 350 L385 390 L115 390 Z" fill="#021C0E" stroke="url(#goldBorder)" stroke-width="2.5" />
    
    <!-- Outer Wing Accents of the Banner -->
    <path d="M115 390 L130 350 L100 365 Z" fill="#01140A" stroke="url(#goldBorder)" stroke-width="1.5" />
    <path d="M385 390 L370 350 L400 365 Z" fill="#01140A" stroke="url(#goldBorder)" stroke-width="1.5" />
  </g>

  <!-- NIGEHBAN Main Text (Bigger, Bold, perfectly spaced) -->
  <text x="250" y="378" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" letter-spacing="4" text-anchor="middle" filter="url(#neonGlow)">
    NIGEHBAN
  </text>

  <!-- Tagline Text (Higher contrast, larger font size, clearer alignment) -->
  <text x="250" y="412" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="12.5" fill="#FFB300" letter-spacing="2" text-anchor="middle">
    PAKISTAN'S GUARDIAN NETWORK
  </text>
  
  <!-- Urdu Calligraphy Text (نگہبان - Larger and clearly aligned) -->
  <text x="250" y="432" font-family="'Segoe UI', 'Tahoma', sans-serif" font-weight="bold" font-size="11" fill="#00E676" letter-spacing="1.5" text-anchor="middle" opacity="0.95" filter="url(#neonGlow)">
    نگہبان — تحفظ اور فوری مدد
  </text>
</svg>