<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021C0E" />
      <stop offset="40%" stop-color="#05381E" />
      <stop offset="70%" stop-color="#0A4D2B" />
      <stop offset="100%" stop-color="#01140A" />
    </linearGradient>

    <!-- Rich Gold Gradient for Trim and Borders -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="25%" stop-color="#FFD54F" />
      <stop offset="50%" stop-color="#FFB300" />
      <stop offset="75%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>

    <!-- Emerald Glow Gradient -->
    <radialGradient id="emeraldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#00E676" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00E676" stop-opacity="0" />
    </radialGradient>

    <!-- SOS/Alert Radial Glow -->
    <radialGradient id="sosGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FF9100" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0" />
    </radialGradient>

    <!-- Silver/Steel Accent Gradient -->
    <linearGradient id="silverAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#CFD8DC" />
      <stop offset="100%" stop-color="#78909C" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.75" />
    </filter>

    <!-- Glow Effect Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Glow Behind Logo -->
  <circle cx="250" cy="220" r="180" fill="url(#emeraldGlow)" opacity="0.6" />

  <!-- 1. OUTER SHIELD STRUCTURE (Protection & Guardian Concept) -->
  <!-- Outer Shield Shadow & Body -->
  <path d="M250 30 L410 85 C410 85 430 220 410 320 C390 390 310 450 250 470 C190 450 110 390 90 320 C70 220 90 85 90 85 Z" 
        fill="url(#shieldBg)" filter="url(#dropShadow)" />

  <!-- Outer Gold Border -->
  <path d="M250 32 L406 87 C406 87 426 218 406 316 C387 384 308 444 250 464 C192 444 113 384 94 316 C74 218 94 87 94 87 Z" 
        fill="none" stroke="url(#goldBorder)" stroke-width="6.5" stroke-linecap="round" />

  <!-- Inner Steel/Silver Border Accent -->
  <path d="M250 42 L394 94 C394 94 412 212 394 302 C377 364 304 422 250 442 C196 422 123 364 106 302 C88 212 106 94 106 94 Z" 
        fill="none" stroke="url(#silverAccent)" stroke-width="2.5" opacity="0.8" />

  <!-- 2. BACKGROUND MESH NETWORK (Connected Responders & Help Grid) -->
  <g opacity="0.25">
    <!-- Network Lines -->
    <line x1="250" y1="110" x2="160" y2="160" stroke="#00E676" stroke-width="2" />
    <line x1="250" y1="110" x2="340" y2="160" stroke="#00E676" stroke-width="2" />
    <line x1="160" y1="160" x2="130" y2="250" stroke="#00E676" stroke-width="1.5" />
    <line x1="340" y1="160" x2="370" y2="250" stroke="#00E676" stroke-width="1.5" />
    <line x1="130" y1="250" x2="180" y2="340" stroke="#00E676" stroke-width="1.5" />
    <line x1="370" y1="250" x2="320" y2="340" stroke="#00E676" stroke-width="1.5" />
    <line x1="180" y1="340" x2="250" y2="370" stroke="#00E676" stroke-width="2" />
    <line x1="320" y1="340" x2="250" y2="370" stroke="#00E676" stroke-width="2" />
    
    <!-- Cross connections -->
    <line x1="160" y1="160" x2="250" y2="230" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="340" y1="160" x2="250" y2="230" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="130" y1="250" x2="250" y2="230" stroke="#00E676" stroke-width="1.5" />
    <line x1="370" y1="250" x2="250" y2="230" stroke="#00E676" stroke-width="1.5" />
    <line x1="180" y1="340" x2="250" y2="230" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="320" y1="340" x2="250" y2="230" stroke="#00E676" stroke-width="1" stroke-dasharray="4,4" />

    <!-- Network Nodes -->
    <circle cx="250" cy="110" r="6" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="160" cy="160" r="5" fill="#00E676" />
    <circle cx="340" cy="160" r="5" fill="#00E676" />
    <circle cx="130" cy="250" r="5.5" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="370" cy="250" r="5.5" fill="#00E676" filter="url(#neonGlow)" />
    <circle cx="180" cy="340" r="5" fill="#00E676" />
    <circle cx="320" cy="340" r="5" fill="#00E676" />
    <circle cx="250" cy="370" r="6" fill="#00E676" filter="url(#neonGlow)" />
  </g>

  <!-- 3. EMERGENCY RADAR / SOS WAVES -->
  <circle cx="250" cy="220" r="90" fill="none" stroke="#FF5722" stroke-width="2" stroke-dasharray="8,8" opacity="0.4" filter="url(#neonGlow)" />
  <circle cx="250" cy="220" r="120" fill="none" stroke="#FF9100" stroke-width="1.5" stroke-dasharray="12,6" opacity="0.3" />

  <!-- 4. PAKISTAN THEME: CRESCENT & STAR -->
  <!-- Placed proudly at the top center of the design -->
  <g transform="translate(215, 60)" filter="url(#neonGlow)">
    <path d="M22 6 A28 28 0 1 0 58 42 A23 23 0 1 1 22 6" fill="#FFFFFF" />
    <polygon points="46,12 49,20 57,20 51,25 53,33 46,28 39,33 41,25 35,20 43,20" fill="#FFD54F" />
  </g>

  <!-- 5. CENTRAL SYMBOL: HOUSE (SHELTER), HEART (CARE), AND MEDICAL CROSS (RELIEF) -->
  <!-- SOS Glow backing -->
  <circle cx="250" cy="235" r="50" fill="url(#sosGlow)" />

  <!-- Heart Shape for Care & Humanity -->
  <path d="M250 280 C200 245 185 200 220 180 C240 168 250 185 250 185 C250 185 260 168 280 180 C315 200 300 245 250 280 Z" 
        fill="#D32F2F" opacity="0.9" filter="url(#dropShadow)" />

  <!-- White House Silhouette (Shelter/Protection) inside the Heart -->
  <path d="M232 230 L250 212 L268 230 L268 252 L232 252 Z" fill="#FFFFFF" />
  <!-- House Roof Line -->
  <polygon points="250,206 226,228 230,232 250,214 270,232 274,228" fill="#FFB300" />
  
  <!-- Red Cross / First Aid Symbol (Emergency Relief) inside House -->
  <rect x="247" y="228" width="6" height="16" fill="#D32F2F" />
  <rect x="242" y="233" width="16" height="6" fill="#D32F2F" />

  <!-- 6. MAP MARKER / LIVE LOCATION PIN (Tracking & Rapid Response) -->
  <!-- Hanging below the central heart as a anchor -->
  <path d="M250 290 L262 310 C265 315 250 330 250 330 C250 330 235 315 238 310 Z" 
        fill="url(#goldBorder)" filter="url(#neonGlow)" />
  <circle cx="250" cy="302" r="4" fill="#FFFFFF" />

  <!-- 7. TEXT & BANNER (Nigehbaan - Pakistan's Guardian Network) -->
  <!-- Premium Ribbon / Plate for the Text -->
  <g filter="url(#dropShadow)">
    <!-- Lower Banner -->
    <path d="M120 380 L380 380 L395 425 L105 425 Z" fill="#021C0E" stroke="url(#goldBorder)" stroke-width="2.5" />
    
    <!-- Outer Wing Accents of the Banner -->
    <path d="M105 425 L120 380 L90 395 Z" fill="#01140A" stroke="url(#goldBorder)" stroke-width="1.5" />
    <path d="M395 425 L380 380 L410 395 Z" fill="#01140A" stroke="url(#goldBorder)" stroke-width="1.5" />
  </g>

  <!-- NIGEHBAN Main Text -->
  <text x="250" y="410" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" letter-spacing="4" text-anchor="middle" filter="url(#neonGlow)">
    NIGEHBAN
  </text>

  <!-- Tagline Text -->
  <text x="250" y="445" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="11" fill="#FFB300" letter-spacing.="1.5" text-anchor="middle">
    PAKISTAN'S GUARDIAN NETWORK
  </text>
  
  <!-- Urdu Calligraphy Text (نگہبان) -->
  <text x="250" y="462" font-family="'Segoe UI', 'Tahoma', sans-serif" font-weight="bold" font-size="10" fill="#00E676" letter-spacing="1" text-anchor="middle" opacity="0.9">
    نگہبان — تحفظ اور فوری مدد
  </text>
</svg>